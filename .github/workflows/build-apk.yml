name: Build Android APK

on:
  push:
    branches: [main, master, claude/music-player-auto-tagging-pksz9t]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Patch @capacitor/filesystem kotlin extension collision
        run: |
          FILE="node_modules/@capacitor/filesystem/android/build.gradle"
          sed -i "s/apply plugin: 'kotlin-android'/if (project.extensions.findByName('kotlin') == null) { apply plugin: 'kotlin-android' }/" "$FILE"
          echo "Patched $FILE"

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo '{"plugins":{}}' > android/app/src/main/assets/capacitor.plugins.json
          mkdir -p android/app/src/main/res/xml
          printf "<?xml version='1.0' encoding='utf-8'?>\n<widget version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\">\n  <access origin=\"*\" />\n</widget>\n" > android/app/src/main/res/xml/config.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install Android SDK 35
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Build debug APK
        run: |
          set -o pipefail
          cd android && ./gradlew assembleDebug --no-daemon 2>&1 | tee ../gradle-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          retention-days: 7

      - name: Verify APK exists
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "APK built successfully: $(du -sh $APK)"
          else
            echo "APK not found!"
            find android/app/build -name "*.apk" 2>/dev/null || echo "No APKs found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuzioAI-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
